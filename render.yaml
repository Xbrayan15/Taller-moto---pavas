services:
  - type: web
    name: taller-moto-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        value: sqlite:///./taller.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: API_TITLE
        value: Taller Moto API
      - key: API_VERSION
        value: "1.0.0"
